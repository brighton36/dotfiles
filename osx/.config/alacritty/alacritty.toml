# Colors (Nord)

# Default colors
[colors.primary]
background = '#2E3440'
foreground = '#4c566a'

# Normal colors
[colors.normal]
black   = '#3B4252'
red     = '#BF616A'
green   = '#A3BE8C'
yellow  = '#EBCB8B'
blue    = '#81A1C1'
magenta = '#B48EAD'
cyan    = '#88C0D0'
white   = '#E5E9F0'

# Bright colors
[colors.bright]
black   = '#4C566A'
red     = '#BF616A'
green   = '#A3BE8C'
yellow  = '#EBCB8B'
blue    = '#81A1C1'
magenta = '#B48EAD'
cyan    = '#8FBCBB'
white   = '#ECEFF4'

[cursor]
unfocused_hollow = true
vi_mode_style = "Block"

[cursor.style]
shape = "Block"

[env]
TERM = "xterm-256color"

[font]
size = 16.0

[font.glyph_offset]
x = 0
y = 0

[font.normal]
family = "UbuntuMono Nerd Font"

[font.offset]
x = 0
y = 0

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[window]
dynamic_padding = true
decorations = "None"
option_as_alt = "Both"

[window.padding]
x = 4
y = 4

[general]
live_config_reload = true

[keyboard]
# For some reason, this just kinda works if I hold down space... sometimes...
