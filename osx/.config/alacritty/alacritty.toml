# Colors (Nord)

# Default colors
[colors.primary]
background = '#ECEFF4'
foreground = '#3b4252'

# Normal colors
[colors.normal]
black   = '#D8DEE9'
red     = '#99324B'
green   = '#4F894C'
yellow  = '#9A7500'
blue    = '#3B6EA8'
magenta = '#97365B'
cyan    = '#398EAC'
white   = '#D8DEE9'

# Bright colors
[colors.bright]
black   = '#D8DEE9'
red     = '#99324B'
green   = '#4F894C'
yellow  = '#9A7500'
blue    = '#3B6EA8'
magenta = '#97365B'
cyan    = '#398EAC'
white   = '#ECEFF4'

[cursor]
unfocused_hollow = true
vi_mode_style = "Block"

[cursor.style]
shape = "Block"

[env]
TERM = "xterm-256color"

[font]
size = 16

[font.glyph_offset]
x = 0
y = 0

[font.normal]
family = "UbuntuMono Nerd Font"

[font.offset]
x = 0
y = 0

[font.bold]
style = "Regular"

[scrolling]
history = 50000

[selection]
save_to_clipboard = true

[window]
dynamic_padding = true
decorations = "buttonless"
option_as_alt = "Both"

[window.padding]
x = 4
y = 4

[general]
live_config_reload = true

[keyboard]
# For some reason, this just kinda works if I hold down space... sometimes...
